name: Android Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile preprod and prod variants
        run: ./gradlew :composeApp:compilePreprodDebugKotlinAndroid :composeApp:compileProdReleaseKotlinAndroid

      - name: Run lint
        run: ./gradlew :composeApp:lintPreprodDebug

      - name: Run unit tests
        run: ./gradlew :composeApp:testPreprodDebugUnitTest

      - name: Assemble prod release
        run: ./gradlew :composeApp:assembleProdRelease
